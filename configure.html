<!-- ══ DEBRID NATIVO ══════════════════════════════════════ -->
<div class="card full">
  <div class="ctitle">⚡ Debrid Direto (Nativo)</div>
  <p class="info" style="margin-bottom:12px">
    Integração direta com TorBox e/ou Real-Debrid — sem StremThru. 
    Links são resolvidos no servidor e entregues como URL HTTP direta no Stremio.
    Só torrents em cache são retornados.
  </p>

  <label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--text);font-size:12px;">
    <input type="checkbox" id="useNativeDebrid"
      style="width:16px;height:16px;accent-color:var(--amber);"
      onchange="toggleNativeDebrid(this.checked)">
    Ativar Debrid Nativo
  </label>

  <div id="nativeDebridConfig" style="display:none;background:rgba(245,166,35,.05);
    border:1px solid var(--adim);border-radius:3px;padding:14px;margin-top:14px;">

    <!-- Modo -->
    <div class="w-row" style="grid-template-columns:120px 1fr;gap:10px;margin-bottom:14px;">
      <div class="w-label">Modo</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;">
          <input type="radio" name="debridMode" value="torbox"     id="dm-tb"   onchange="onDebridModeChange()" style="accent-color:var(--amber)">
          🟠 TorBox
        </label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;">
          <input type="radio" name="debridMode" value="realdebrid" id="dm-rd"   onchange="onDebridModeChange()" style="accent-color:var(--amber)">
          🟣 Real-Debrid
        </label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;">
          <input type="radio" name="debridMode" value="dual"       id="dm-dual" onchange="onDebridModeChange()" style="accent-color:var(--amber)" checked>
          ⚡ Dual (ambos)
        </label>
      </div>
    </div>

    <hr style="border-top:1px solid var(--bord2);margin:10px 0;">

    <!-- TorBox Key -->
    <div id="tb-section">
      <div class="w-row" style="grid-template-columns:120px 1fr;gap:10px;margin-bottom:6px;">
        <div class="w-label">🟠 TorBox API Key</div>
        <input type="password" id="tbKey" placeholder="TorBox API Key"
          style="margin-bottom:0;" oninput="debridKeyChange()">
      </div>
      <div style="display:flex;gap:8px;margin-bottom:10px;">
        <button class="btn btn-s btn-sm" onclick="testDebrid('torbox')">Testar TorBox</button>
        <span id="tb-status" style="font-size:11px;color:var(--dim);align-self:center;"></span>
      </div>
    </div>

    <hr style="border-top:1px solid var(--bord2);margin:10px 0;" id="tb-rd-divider">

    <!-- RD Key -->
    <div id="rd-section">
      <div class="w-row" style="grid-template-columns:120px 1fr;gap:10px;margin-bottom:6px;">
        <div class="w-label">🟣 Real-Debrid API Key</div>
        <input type="password" id="rdKey" placeholder="Real-Debrid API Key"
          style="margin-bottom:0;" oninput="debridKeyChange()">
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-s btn-sm" onclick="testDebrid('realdebrid')">Testar RD</button>
        <span id="rd-status" style="font-size:11px;color:var(--dim);align-self:center;"></span>
      </div>
    </div>

  </div>
</div>
